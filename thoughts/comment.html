<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illya Gerasymchuk | Financial Markets, Macro, Bitcoin & Commodities – Comment</title>
    <meta name="description" content="Compose a comment or reply for an Illya thought.">
    <meta name="robots" content="noindex, follow">
    <link rel="alternate" type="application/rss+xml" title="Illya Gerasymchuk Thoughts RSS" href="https://illya.sh/thoughts/feed.xml"/>
    <link rel="alternate" type="application/rss+xml" title="Illya Gerasymchuk Threads RSS" href="https://illya.sh/threads/feed.xml"/>
    <link rel="preload" href="/staticthoughts/data/fonts/space-grotesk/space-grotesk-latin-700.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="/staticthoughts/data/fonts/ibm-plex-sans/ibm-plex-sans-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="/staticthoughts/data/fonts/literata/Literata-VF-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="/staticthoughts/data/fonts/literata/Literata-Italic-VF-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <style>
        :root {
            --nb-ink: #121212;
            --nb-paper: #efece4;
            --nb-page: #e7e2d8;
            --nb-yellow: #f0d54f;
            --nb-pink: #eb4fbb;
            --nb-white: #faf7f0;
            --nb-link: #1734c5;
            --nb-border: 3px;
            --nb-content-border: 2px;
            --nb-radius-sm: 7px;
            --nb-radius-md: 10px;
            --nb-shadow-sm: 2px 2px 0 var(--nb-ink);
            --nb-shadow-lg: 4px 4px 0 var(--nb-ink);
            --font-display: "Space Grotesk", "Arial Black", "Segoe UI", sans-serif;
            --font-body: "IBM Plex Sans", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-reading: "Literata", Georgia, serif;
        }

        @font-face {
            font-family: "Space Grotesk";
            src: url('/staticthoughts/data/fonts/space-grotesk/space-grotesk-latin-700.woff2') format('woff2');
            font-style: normal;
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: "IBM Plex Sans";
            src: url('/staticthoughts/data/fonts/ibm-plex-sans/ibm-plex-sans-latin.woff2') format('woff2');
            font-style: normal;
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: "IBM Plex Sans";
            src: url('/staticthoughts/data/fonts/ibm-plex-sans/ibm-plex-sans-latin.woff2') format('woff2');
            font-style: normal;
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'Literata';
            src: url('/staticthoughts/data/fonts/literata/Literata-VF-latin.woff2') format('woff2-variations');
            font-style: normal;
            font-weight: 200 900;
            font-display: swap;
        }

        @font-face {
            font-family: 'Literata';
            src: url('/staticthoughts/data/fonts/literata/Literata-Italic-VF-latin.woff2') format('woff2-variations');
            font-style: italic;
            font-weight: 200 900;
            font-display: swap;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font-body);
            color: var(--nb-ink);
            background:
                radial-gradient(circle at top right, rgba(246, 201, 230, 0.14), transparent 18rem),
                linear-gradient(
                    180deg,
                    var(--nb-pink) 0,
                    var(--nb-pink) 2.2rem,
                    var(--nb-yellow) 2.2rem,
                    var(--nb-yellow) 8.75rem,
                    var(--nb-page) 8.75rem,
                    var(--nb-page) 100%
                );
            padding: max(0.45rem, env(safe-area-inset-top)) 0.6rem max(0.8rem, env(safe-area-inset-bottom));
        }

        a {
            color: var(--nb-link);
        }

        a:focus-visible,
        button:focus-visible,
        textarea:focus-visible {
            outline: 3px solid #ff2f6f;
            outline-offset: 3px;
        }

        .container {
            width: 100%;
            max-width: 46rem;
            margin: 0 auto;
            display: grid;
            gap: 0.75rem;
        }

        .compose-area {
            border: var(--nb-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-md);
            background: var(--nb-paper);
            box-shadow: var(--nb-shadow-lg);
            padding: 0.75rem;
        }

        .compose-title {
            margin: 0 0 0.55rem;
            font-family: var(--font-display);
            font-size: clamp(1.05rem, 4.2vw, 1.22rem);
            line-height: 1.02;
        }

        .compose-area textarea {
            width: 100%;
            min-height: 120px;
            padding: 0.65rem;
            border: var(--nb-content-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-sm);
            background: var(--nb-white);
            color: var(--nb-ink);
            font-family: var(--font-body);
            font-size: 0.98rem;
            line-height: 1.42;
            resize: vertical;
        }

        .compose-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.6rem;
            margin-top: 0.55rem;
        }

        .char-counter {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 0.24rem 0.5rem;
            border: var(--nb-content-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-sm);
            background: var(--nb-white);
            box-shadow: none;
            font-family: var(--font-display);
            font-size: 0.66rem;
            font-weight: 700;
            line-height: 1;
        }

        .post-button {
            min-height: 34px;
            padding: 0.3rem 0.72rem;
            border: var(--nb-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-sm);
            background: var(--nb-yellow);
            color: var(--nb-ink);
            box-shadow: var(--nb-shadow-lg);
            font-family: var(--font-display);
            font-size: 0.78rem;
            font-weight: 700;
            line-height: 1.05;
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease, background-color 120ms ease;
        }

        .post-button:disabled {
            cursor: default;
            background: #d8d3ca;
            color: rgba(18, 18, 18, 0.55);
            box-shadow: none;
        }

        .post-button:hover:enabled {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 var(--nb-ink);
            background: var(--nb-white);
        }

        .quote-wrapper .thought-box {
            border: var(--nb-content-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-md);
            background: var(--nb-paper);
            box-shadow: var(--nb-shadow-sm);
            padding: 0.75rem;
            margin: 0;
        }

        .quote-wrapper .thought-header {
            display: grid;
            grid-template-columns: 32px minmax(0, 1fr);
            gap: 8px;
            align-items: start;
            margin-bottom: 8px;
        }

        .quote-wrapper .thought-user-img {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            object-fit: cover;
            border: 2px solid var(--nb-ink);
            background: var(--nb-white);
            box-shadow: 0 0 0 2px var(--nb-pink);
        }

        .quote-wrapper .thought-header-main {
            min-width: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 4px 8px;
            align-items: center;
        }

        .quote-wrapper .user-name {
            font-family: var(--font-display);
            font-size: 0.98rem;
            font-weight: 700;
            line-height: 1;
        }

        .quote-wrapper .thought-date-time {
            margin: 0;
            justify-self: end;
        }

        .quote-wrapper .thought-permalink {
            display: inline-flex;
            align-items: center;
            padding: 0.14rem 0.42rem;
            border: var(--nb-content-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-sm);
            background: var(--nb-white);
            box-shadow: var(--nb-shadow-sm);
            color: var(--nb-ink);
            font-family: var(--font-display);
            font-size: 0.66rem;
            font-weight: 700;
            line-height: 1;
            text-decoration: none;
        }

        .quote-wrapper .thought-content p {
            margin: 0;
            color: var(--nb-ink);
            font-family: var(--font-reading);
            font-weight: 280;
            font-optical-sizing: auto;
            font-size: 0.98rem;
            line-height: 1.42;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .quote-wrapper .thought-image {
            margin-top: 0.72rem;
        }

        .quote-wrapper .thought-image .lightbox-trigger {
            display: block;
            width: 100%;
            margin: 0;
            border: var(--nb-content-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-md);
            overflow: hidden;
            background: var(--nb-white);
            box-shadow: var(--nb-shadow-sm);
        }

        .quote-wrapper .thought-image img {
            display: block;
            width: 100%;
            height: auto;
        }

        .quote-wrapper .quoted-thought-container,
        .quote-wrapper .thought-actions,
        .quote-wrapper .share-button,
        .quote-wrapper .comment-button {
            display: none !important;
        }

        @media (max-width: 600px) {
            body {
                padding: max(0.4rem, env(safe-area-inset-top)) 0.5rem max(0.75rem, env(safe-area-inset-bottom));
            }

            .compose-area {
                padding: 0.7rem;
            }

            .compose-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .post-button,
            .char-counter {
                width: 100%;
                justify-content: center;
            }

            .quote-wrapper .thought-header-main {
                grid-template-columns: 1fr;
            }

            .quote-wrapper .thought-date-time {
                justify-self: start;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="quote-container" class="quote-wrapper"><!-- quote fetched by JS --></div>
    <div class="compose-area">
        <p class="compose-title">Reply to this thought</p>
        <textarea id="reply-input" maxlength="512" placeholder="Write your comment… (max 512 chars)"></textarea>
        <div class="compose-controls">
            <span id="char-count" class="char-counter">0 / 512</span>
            <button id="post-btn" class="post-button" disabled>🚀 Continue</button>
        </div>
    </div>
</div>
<script>
(function(){
  const params=new URLSearchParams(window.location.search);
  const id=params.get('id');
  if(!id){document.body.innerHTML='Invalid request';return;}
  const STORAGE_KEY='comment_'+id;
  const input=document.getElementById('reply-input');
  const postBtn=document.getElementById('post-btn');
  const charCount=document.getElementById('char-count');

  function loadSaved(){
      try{
          const raw=localStorage.getItem(STORAGE_KEY);
          if(!raw) return null;
          const obj=JSON.parse(raw);
          if(obj.expires && Date.now()>obj.expires){ localStorage.removeItem(STORAGE_KEY); return null; }
          return obj;
      }catch(e){ return null; }
  }
  const savedObj=loadSaved();
  if(savedObj){ input.value=savedObj.text||''; updateCounter(); }

  input.focus();
  input.setSelectionRange(input.value.length,input.value.length);

  input.addEventListener('input',()=>{
    updateCounter();
    try{
        const obj={text:input.value, expires:Date.now()+7*24*3600000};
        localStorage.setItem(STORAGE_KEY,JSON.stringify(obj));
    }catch(e){}
  });
  function updateCounter(){
    charCount.textContent=input.value.length+' / 512';
    postBtn.disabled=!input.value.trim().length;
  }

  postBtn.addEventListener('click',()=>{
    const encoded=encodeURIComponent(input.value.trim());
    window.location.href='comment_medium.html?id='+encodeURIComponent(id)+'&msg='+encoded;
  });

  const isNumericId=/^\d+$/.test(id);
  const preferredThoughtPath=isNumericId?('@'+id+'.html'):id;
  const fallbackThoughtPath=isNumericId?null:(id+'.html');

  async function fetchThoughtHtml(primaryPath, fallbackPath){
    try{
      const primaryRes=await fetch(primaryPath);
      if(primaryRes.ok){
        return await primaryRes.text();
      }
    }catch(e){}
    if(fallbackPath){
      const fallbackRes=await fetch(fallbackPath);
      if(fallbackRes.ok){
        return await fallbackRes.text();
      }
    }
    throw new Error('Thought HTML not found');
  }

  fetchThoughtHtml(preferredThoughtPath,fallbackThoughtPath)
  .then(html=>{
    const parser=new DOMParser();
    const doc=parser.parseFromString(html,'text/html');
    let tb=doc.querySelector('.thought-box');
    if(!tb) throw new Error('Thought box missing');
    tb.querySelectorAll('.quoted-thought-container').forEach(el=>el.remove());
    const imported=document.importNode(tb,true);
    document.getElementById('quote-container').appendChild(imported);
  })
  .catch(err=>{
    document.getElementById('quote-container').innerHTML='<p style="margin:0;">Unable to load thought preview.</p>';
  });
})();
</script>
</body>
</html>
