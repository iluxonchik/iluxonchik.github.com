<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illya Gerasymchuk | Financial Markets, Macro, Bitcoin & Commodities – Send Comment</title>
    <meta name="description" content="Choose where to send your comment about an Illya thought.">
    <meta name="robots" content="noindex, follow">
    <link rel="alternate" type="application/rss+xml" title="Illya Gerasymchuk Thoughts RSS" href="https://illya.sh/thoughts/feed.xml"/>
    <link rel="alternate" type="application/rss+xml" title="Illya Gerasymchuk Threads RSS" href="https://illya.sh/threads/feed.xml"/>
    <link rel="preload" href="/staticthoughts/data/fonts/space-grotesk/space-grotesk-latin-700.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="/staticthoughts/data/fonts/ibm-plex-sans/ibm-plex-sans-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="/staticthoughts/data/fonts/literata/Literata-VF-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="/staticthoughts/data/fonts/literata/Literata-Italic-VF-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <style>
        :root {
            --nb-ink: #121212;
            --nb-paper: #efece4;
            --nb-page: #e7e2d8;
            --nb-yellow: #f0d54f;
            --nb-pink: #eb4fbb;
            --nb-white: #faf7f0;
            --nb-link: #1734c5;
            --nb-border: 3px;
            --nb-content-border: 2px;
            --nb-radius-sm: 7px;
            --nb-radius-md: 10px;
            --nb-shadow-sm: 2px 2px 0 var(--nb-ink);
            --nb-shadow-lg: 4px 4px 0 var(--nb-ink);
            --font-display: "Space Grotesk", "Arial Black", "Segoe UI", sans-serif;
            --font-body: "IBM Plex Sans", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-reading: "Literata", Georgia, serif;
        }

        @font-face {
            font-family: "Space Grotesk";
            src: url('/staticthoughts/data/fonts/space-grotesk/space-grotesk-latin-700.woff2') format('woff2');
            font-style: normal;
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: "IBM Plex Sans";
            src: url('/staticthoughts/data/fonts/ibm-plex-sans/ibm-plex-sans-latin.woff2') format('woff2');
            font-style: normal;
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: "IBM Plex Sans";
            src: url('/staticthoughts/data/fonts/ibm-plex-sans/ibm-plex-sans-latin.woff2') format('woff2');
            font-style: normal;
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'Literata';
            src: url('/staticthoughts/data/fonts/literata/Literata-VF-latin.woff2') format('woff2-variations');
            font-style: normal;
            font-weight: 200 900;
            font-display: swap;
        }

        @font-face {
            font-family: 'Literata';
            src: url('/staticthoughts/data/fonts/literata/Literata-Italic-VF-latin.woff2') format('woff2-variations');
            font-style: italic;
            font-weight: 200 900;
            font-display: swap;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font-body);
            color: var(--nb-ink);
            background:
                radial-gradient(circle at top right, rgba(246, 201, 230, 0.14), transparent 18rem),
                linear-gradient(
                    180deg,
                    var(--nb-pink) 0,
                    var(--nb-pink) 2.2rem,
                    var(--nb-yellow) 2.2rem,
                    var(--nb-yellow) 8.75rem,
                    var(--nb-page) 8.75rem,
                    var(--nb-page) 100%
                );
            padding: max(0.45rem, env(safe-area-inset-top)) 0.6rem max(0.8rem, env(safe-area-inset-bottom));
        }

        a {
            color: var(--nb-link);
        }

        a:focus-visible,
        button:focus-visible {
            outline: 3px solid #ff2f6f;
            outline-offset: 3px;
        }

        .container {
            width: 100%;
            max-width: 46rem;
            margin: 0 auto;
            display: grid;
            gap: 0.75rem;
        }

        .message-panel {
            border: var(--nb-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-md);
            background: var(--nb-paper);
            box-shadow: var(--nb-shadow-lg);
            padding: 0.75rem;
        }

        .message-title {
            margin: 0 0 0.55rem;
            font-family: var(--font-display);
            font-size: clamp(1.05rem, 4.2vw, 1.22rem);
            line-height: 1.02;
        }

        .message-box {
            white-space: pre-wrap;
            border: var(--nb-content-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-md);
            background: var(--nb-white);
            box-shadow: var(--nb-shadow-sm);
            padding: 0.65rem;
            font-size: 0.98rem;
            line-height: 1.42;
            max-height: 220px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .medium-buttons {
            display: grid;
            gap: 0.6rem;
            margin-top: 0.72rem;
        }

        .btn-standard {
            min-height: 34px;
            padding: 0.3rem 0.72rem;
            border: var(--nb-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-sm);
            background: var(--nb-yellow);
            color: var(--nb-ink);
            box-shadow: var(--nb-shadow-lg);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            font-family: var(--font-display);
            font-size: 0.78rem;
            font-weight: 700;
            line-height: 1.05;
            transition: transform 120ms ease, box-shadow 120ms ease, background-color 120ms ease;
        }

        .btn-standard:hover {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 var(--nb-ink);
            background: var(--nb-white);
            color: var(--nb-ink);
            text-decoration: none;
        }

        .quote-wrapper .thought-box {
            border: var(--nb-content-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-md);
            background: var(--nb-paper);
            box-shadow: var(--nb-shadow-sm);
            padding: 0.75rem;
            margin: 0;
        }

        .quote-wrapper .thought-header {
            display: grid;
            grid-template-columns: 32px minmax(0, 1fr);
            gap: 8px;
            align-items: start;
            margin-bottom: 8px;
        }

        .quote-wrapper .thought-user-img {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            object-fit: cover;
            border: 2px solid var(--nb-ink);
            background: var(--nb-white);
            box-shadow: 0 0 0 2px var(--nb-pink);
        }

        .quote-wrapper .thought-header-main {
            min-width: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 4px 8px;
            align-items: center;
        }

        .quote-wrapper .user-name {
            font-family: var(--font-display);
            font-size: 0.98rem;
            font-weight: 700;
            line-height: 1;
        }

        .quote-wrapper .thought-date-time {
            margin: 0;
            justify-self: end;
        }

        .quote-wrapper .thought-permalink {
            display: inline-flex;
            align-items: center;
            padding: 0.14rem 0.42rem;
            border: var(--nb-content-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-sm);
            background: var(--nb-white);
            box-shadow: var(--nb-shadow-sm);
            color: var(--nb-ink);
            font-family: var(--font-display);
            font-size: 0.66rem;
            font-weight: 700;
            line-height: 1;
            text-decoration: none;
        }

        .quote-wrapper .thought-content p {
            margin: 0;
            color: var(--nb-ink);
            font-family: var(--font-reading);
            font-weight: 280;
            font-optical-sizing: auto;
            font-size: 0.98rem;
            line-height: 1.42;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .quote-wrapper .thought-image {
            margin-top: 0.72rem;
        }

        .quote-wrapper .thought-image .lightbox-trigger {
            display: block;
            width: 100%;
            margin: 0;
            border: var(--nb-content-border) solid var(--nb-ink);
            border-radius: var(--nb-radius-md);
            overflow: hidden;
            background: var(--nb-white);
            box-shadow: var(--nb-shadow-sm);
        }

        .quote-wrapper .thought-image img {
            display: block;
            width: 100%;
            height: auto;
        }

        .quote-wrapper .quoted-thought-container,
        .quote-wrapper .thought-actions,
        .quote-wrapper .share-button,
        .quote-wrapper .comment-button {
            display: none !important;
        }

        @media (min-width: 48rem) {
            .medium-buttons {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 600px) {
            body {
                padding: max(0.4rem, env(safe-area-inset-top)) 0.5rem max(0.75rem, env(safe-area-inset-bottom));
            }

            .message-panel {
                padding: 0.7rem;
            }

            .quote-wrapper .thought-header-main {
                grid-template-columns: 1fr;
            }

            .quote-wrapper .thought-date-time {
                justify-self: start;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="quote-container" class="quote-wrapper"></div>
    <div class="message-panel">
        <p class="message-title">Choose where to send this reply</p>
        <div id="message-display" class="message-box"></div>
        <div class="medium-buttons" id="medium-buttons">
            <a id="email-link" class="btn-standard" target="_blank" rel="noopener noreferrer">📧 Comment via E-mail</a>
            <a id="x-link" class="btn-standard" target="_blank" rel="noopener noreferrer">🐦 Comment via X / Twitter</a>
        </div>
        <div id="after-action" style="display:none; margin-top:0.85rem;">
            <a id="back-btn" href="#" class="btn-standard">⬅️ Back</a>
        </div>
    </div>
</div>
<script>
(function(){
  const params=new URLSearchParams(location.search);
  const id=params.get('id');
  const msgRaw=params.get('msg')||'';
  const msg=decodeURIComponent(msgRaw);
  if(!id){document.body.innerHTML='Invalid request';return;}
  document.getElementById('message-display').textContent=msg;

  const baseThoughts='https://illya.sh/thoughts'.replace(/\/$/,'');
  const isNumericId=/^\d+$/.test(id);
  const preferredThoughtPath=isNumericId?('@'+id+'.html'):id;
  const fallbackThoughtPath=isNumericId?null:(id+'.html');
  const thoughtUrl=baseThoughts+'/'+preferredThoughtPath;

  const encodedMessage=`Hello Illya,%0A%0AI have some thoughts on ${encodeURIComponent(thoughtUrl)}:%0A%0A${encodeURIComponent(msg)}`;

  const emailLink=document.getElementById('email-link');
  const tgLink=document.getElementById('tg-link');
  const xLink=document.getElementById('x-link');

  if(emailLink){ emailLink.href=`mailto:hello@illya.sh?subject=Thought%20comment&body=${encodedMessage}`; }
  if(tgLink){ tgLink.href=`https://t.me/illya_gerasymchuk?text=${encodedMessage}`; }
  const tweetTextBase = `👋 @illyaGera\n\n${msg}\n\n`;
  const tweetTextEnc = encodeURIComponent(tweetTextBase);
  if(xLink){ xLink.href=`https://twitter.com/intent/tweet?text=${tweetTextEnc}&url=${encodeURIComponent(thoughtUrl)}`; }

  const backBtn=document.getElementById('back-btn');
  function navigateBack(){
      const origin = location.origin;
      const ref = document.referrer || '';
      if(ref.startsWith(origin) && history.length>1){
          if(ref.includes('/comment.html') && history.length>2){
              history.go(-2);
          }else{
              history.back();
          }
      }else{
          window.location.href='https://illya.sh/thoughts';
      }
  }
  backBtn.addEventListener('click',navigateBack);
  function updateExpiry(hours){
      try{
          const key='comment_'+id;
          const stored=localStorage.getItem(key);
          if(stored){
              const obj=JSON.parse(stored);
              obj.expires=Date.now()+hours*3600000;
              localStorage.setItem(key,JSON.stringify(obj));
          }
      }catch(e){}
  }
  function revealBack(){
      document.getElementById('after-action').style.display='block';
      updateExpiry(1);
  }
  if(emailLink){ emailLink.addEventListener('click',revealBack); }
  if(tgLink){ tgLink.addEventListener('click',revealBack); }
  if(xLink){ xLink.addEventListener('click',revealBack); }

  async function fetchThoughtHtml(primaryPath, fallbackPath){
    try{
      const primaryRes=await fetch(primaryPath);
      if(primaryRes.ok){
        return await primaryRes.text();
      }
    }catch(e){}
    if(fallbackPath){
      const fallbackRes=await fetch(fallbackPath);
      if(fallbackRes.ok){
        return await fallbackRes.text();
      }
    }
    throw new Error('Thought HTML not found');
  }

  fetchThoughtHtml(preferredThoughtPath,fallbackThoughtPath)
  .then(html=>{
    const parser=new DOMParser();
    const doc=parser.parseFromString(html,'text/html');
    let tb=doc.querySelector('.thought-box');
    if(!tb) throw new Error('Thought box missing');
    tb.querySelectorAll('.quoted-thought-container').forEach(el=>el.remove());
    const imported=document.importNode(tb,true);
    document.getElementById('quote-container').appendChild(imported);
  })
  .catch(err=>{
    document.getElementById('quote-container').innerHTML='<p style="margin:0;">Unable to load thought preview.</p>';
  });
})();
</script>
</body>
</html>
